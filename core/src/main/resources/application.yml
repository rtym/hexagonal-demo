spring:
  application:
    name: hexagonal-demo

server:
  port: 8080

adapter:
  file:
    input-dir: ./input
    polling-interval-ms: 5000              # scan every 5 s

infrastructure:
  plugins:
    directory: ./plugins                   # drop JARs here for hot-loading

logging:
  level:
    com.example.hexdemo: DEBUG
