services:
  app:
    build: .
    container_name: hexdemo-app
    ports:
      - "8080:8080"
    volumes:
      # Drop plugin JARs here at runtime for hot-loading
      - ./plugins:/app/plugins
      # Drop .txt files here to trigger the file adapter
      - ./input:/app/input
    environment:
      INFRASTRUCTURE_PLUGINS_DIRECTORY: /app/plugins
      ADAPTER_FILE_INPUT_DIR: /app/input
      ADAPTER_FILE_POLLING_INTERVAL_MS: 5000
